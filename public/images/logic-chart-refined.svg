<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Deskhand Logic Chart Refined</title>
  <desc id="desc">Refined standalone mindmap asset for Deskhand with natural continuous curves and restrained editorial styling.</desc>
  <defs>
    <radialGradient id="rootGlow" cx="34%" cy="50%" r="58%">
      <stop offset="0%" stop-color="rgba(29,103,95,0.14)"/>
      <stop offset="46%" stop-color="rgba(29,103,95,0.06)"/>
      <stop offset="100%" stop-color="rgba(29,103,95,0)"/>
    </radialGradient>
    <style>
      .root-title {
        fill: #1d675f;
        font-family: "Fraunces", "Noto Serif SC", serif;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
      .root-subtitle {
        fill: rgba(70, 81, 75, 0.76);
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
      .main-label {
        fill: #1f2522;
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .main-label.emphasis {
        fill: #1d675f;
      }
      .sub-label {
        fill: rgba(55, 64, 60, 0.88);
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        font-size: 12px;
        font-weight: 500;
      }
      .sub-label.emphasis {
        fill: #1f524b;
        font-weight: 600;
      }
      .trunk {
        fill: none;
        stroke: rgba(29, 103, 95, 0.84);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 3;
      }
      .main-run {
        fill: none;
        stroke: rgba(29, 103, 95, 0.84);
        stroke-linecap: round;
        stroke-width: 2.8;
      }
      .main-run.muted {
        stroke: rgba(95, 115, 108, 0.72);
      }
      .sub-curve {
        fill: none;
        stroke: rgba(29, 103, 95, 0.78);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.2;
      }
      .sub-curve.muted {
        stroke: rgba(113, 128, 122, 0.56);
        stroke-width: 1.9;
      }
      .sub-run {
        fill: none;
        stroke: rgba(29, 103, 95, 0.78);
        stroke-linecap: round;
        stroke-width: 2;
      }
      .sub-run.muted {
        stroke: rgba(113, 128, 122, 0.52);
        stroke-width: 1.7;
      }
    </style>
  </defs>

  <g>
