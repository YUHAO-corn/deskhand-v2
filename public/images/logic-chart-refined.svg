    <path class="main-run" d="M 304 520 L 464 520" />
    <text class="main-label emphasis" x="366" y="512">扩展能力</text>

    <path class="sub-curve" d="M 464 520 C 490 520, 494 478, 522 478" />
    <path class="sub-run" d="M 522 478 L 892 478" />
