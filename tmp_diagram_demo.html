<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图表方案对比</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #e8e2d9; font-family: -apple-system, sans-serif; min-height: 100vh; }

.shell { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }

/* Sidebar */
.sidebar { background: #171b20; border-right: 1px solid #2a2f38; padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; }
.sidebar h2 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b7280; margin-bottom: 8px; }
.tab-btn {
  padding: 10px 14px; border-radius: 8px; border: none; background: transparent;
  color: #9ca3af; font-size: 13px; text-align: left; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.tab-btn:hover { background: #1e2328; color: #e8e2d9; }
.tab-btn.active { background: #1d675f22; color: #4db8ad; border: 1px solid #1d675f44; }
.tab-label { font-size: 11px; color: #6b7280; margin-top: 16px; padding-left: 4px; }

/* Main */
.main { padding: 40px; overflow: auto; }
.diagram-wrap { display: none; }
.diagram-wrap.active { display: block; }
.diagram-title { font-size: 13px; color: #6b7280; margin-bottom: 32px; line-height: 1.6; }
.diagram-title strong { color: #4db8ad; }

/* Legend */
.legend { display: flex; gap: 20px; margin-bottom: 28px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9ca3af; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.legend-dot.base { background: #2a3040; border: 1px solid #3a4050; }
.legend-dot.highlight { background: #1d675f33; border: 1px solid #1d675f88; }
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar">
    <h2>图表方案</h2>
    <button class="tab-btn active" onclick="show('a')">A · 功能块图</button>
    <button class="tab-btn" onclick="show('b')">B · 分层图</button>
    <button class="tab-btn" onclick="show('c')">C · 辐射图</button>
    <button class="tab-btn" onclick="show('d')">D · 树形图</button>
    <button class="tab-btn" onclick="show('e')">E · 思维导图</button>
  </div>
  <div class="main" id="main">
    <!-- panels -->
    <div class="diagram-wrap active" id="panel-a">
      <div class="diagram-title">
        <strong>A · 功能块图</strong> — 所有能力区域平铺为方块，三个亮点功能用颜色区分。像一张产品能力地图，一眼看清有哪些区域，高亮区域是接下来的重点。
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot base"></div>基础能力</div>
        <div class="legend-item"><div class="legend-dot highlight"></div>本次重点</div>
      </div>
      <div id="grid-a"></div>
    </div>

    <div class="diagram-wrap" id="panel-b">
      <div class="diagram-title">
        <strong>B · 分层图</strong> — 从下到上分层：底层是技术基础，中层是核心功能，顶层是亮点功能。强调"亮点是建立在完整产品之上的"。
      </div>
      <div id="grid-b"></div>
    </div>

    <div class="diagram-wrap" id="panel-c">
      <div class="diagram-title">
        <strong>C · 辐射图</strong> — Deskhand 居中，各能力从中心向外辐射，三个亮点分支用颜色加粗突出。
      </div>
      <div id="grid-c" style="display:flex;justify-content:center;align-items:center;min-height:420px;"></div>
    </div>

    <div class="diagram-wrap" id="panel-d">
      <div class="diagram-title">
        <strong>D · 树形层级图</strong> — 传统树形结构，根节点是 Deskhand，向下展开各模块。三个亮点节点高亮。
      </div>
      <div id="grid-d"></div>
    </div>
    <div class="diagram-wrap" id="panel-e">
      <div class="diagram-title">
        <strong>E · 思维导图</strong> — 横向展开，根节点居左，各分支向右延伸，子节点挂在分支上。三个亮点分支高亮。
      </div>
      <div id="grid-e" style="overflow:auto;"></div>
    </div>
  </div>
</div>

<script>
// ── shared data ──────────────────────────────────────────
const BASE = [
  { label: '对话', sub: '多会话 · 流式输出 · 工具可视化' },
  { label: '文件与项目', sub: '工作目录 · 文件附件 · Artifact' },
  { label: '权限控制', sub: 'Ask / Auto 模式' },
  { label: '设置', sub: '模型 · API · 语言' },
];
const HIGHLIGHT = [
  { label: 'Generative UI', sub: 'Playground · This or That' },
  { label: 'Skill 系统', sub: 'Skill Insight · 自动推荐' },
  { label: '剪贴板感知', sub: '历史监控 · AI 可调用' },
];

// ── A: block grid ─────────────────────────────────────────
function renderA() {
  const el = document.getElementById('grid-a');
  const all = [...BASE.map(i => ({...i, hi: false})), ...HIGHLIGHT.map(i => ({...i, hi: true}))];
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:780px">
    ${all.map(item => `
      <div style="padding:16px 18px;border-radius:12px;border:1px solid ${item.hi ? '#1d675f66' : '#2a3040'};background:${item.hi ? '#1d675f1a' : '#1e2328'}">
        <div style="font-size:13px;font-weight:600;color:${item.hi ? '#4db8ad' : '#c9cfd6'};margin-bottom:6px">${item.label}</div>
        <div style="font-size:11px;color:#6b7280;line-height:1.5">${item.sub}</div>
        ${item.hi ? '<div style="margin-top:10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#1d675f;font-weight:700">本次重点</div>' : ''}
      </div>
    `).join('')}
  </div>`;
}

// ── B: layered ────────────────────────────────────────────
function renderB() {
  const el = document.getElementById('grid-b');
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px;max-width:700px">
    <div style="text-align:center;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6b7280;margin-bottom:4px">亮点功能层</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${HIGHLIGHT.map(i => `
        <div style="padding:16px;border-radius:12px;background:#1d675f1a;border:1px solid #1d675f66;text-align:center">
          <div style="font-size:13px;font-weight:600;color:#4db8ad;margin-bottom:4px">${i.label}</div>
          <div style="font-size:11px;color:#6b7280">${i.sub}</div>
        </div>
      `).join('')}
    </div>
    <div style="text-align:center;color:#3a4050;font-size:18px">↑</div>
    <div style="text-align:center;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6b7280;margin-bottom:4px">核心功能层</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${BASE.map(i => `
        <div style="padding:14px;border-radius:10px;background:#1e2328;border:1px solid #2a3040;text-align:center">
          <div style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:4px">${i.label}</div>
          <div style="font-size:10px;color:#4b5563">${i.sub}</div>
        </div>
      `).join('')}
    </div>
    <div style="text-align:center;color:#3a4050;font-size:18px">↑</div>
    <div style="text-align:center;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6b7280;margin-bottom:4px">技术基础层</div>
    <div style="padding:14px 20px;border-radius:10px;background:#171b20;border:1px solid #2a3040;text-align:center;color:#4b5563;font-size:12px">
      Electron · Claude Agent SDK · MCP · 本地文件系统
    </div>
  </div>`;
}

// ── C: radial (SVG) ───────────────────────────────────────
function renderC() {
  const el = document.getElementById('grid-c');
  const W = 520, H = 420, cx = W/2, cy = H/2;
  const allNodes = [...BASE, ...HIGHLIGHT];
  const angles = allNodes.map((_, i) => (i / allNodes.length) * 2 * Math.PI - Math.PI/2);
  const R = 160;

  const lines = allNodes.map((n, i) => {
    const x = cx + R * Math.cos(angles[i]);
    const y = cy + R * Math.sin(angles[i]);
    const hi = HIGHLIGHT.includes(n);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${hi ? '#1d675f' : '#2a3040'}" stroke-width="${hi ? 2 : 1}"/>`;
  }).join('');

  const nodes = allNodes.map((n, i) => {
    const x = cx + R * Math.cos(angles[i]);
    const y = cy + R * Math.sin(angles[i]);
    const hi = HIGHLIGHT.includes(n);
    const anchor = x < cx - 10 ? 'end' : x > cx + 10 ? 'start' : 'middle';
    return `
      <circle cx="${x}" cy="${y}" r="${hi ? 7 : 5}" fill="${hi ? '#1d675f' : '#2a3040'}" stroke="${hi ? '#4db8ad' : '#3a4050'}" stroke-width="1.5"/>
      <text x="${x + (anchor === 'end' ? -14 : anchor === 'start' ? 14 : 0)}" y="${y + (y < cy ? -12 : y > cy ? 14 : 4)}" text-anchor="${anchor}" font-size="11" fill="${hi ? '#4db8ad' : '#6b7280'}" font-family="-apple-system,sans-serif">${n.label}</text>
    `;
  }).join('');

  el.innerHTML = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    ${lines}
    <circle cx="${cx}" cy="${cy}" r="46" fill="#171b20" stroke="#2a3040" stroke-width="1.5"/>
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e2d9" font-family="-apple-system,sans-serif">Deskhand</text>
    <text x="${cx}" y="${cy + 10}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="-apple-system,sans-serif">桌面智能体</text>
    ${nodes}
  </svg>`;
}

// ── D: tree ───────────────────────────────────────────────
function renderD() {
  const el = document.getElementById('grid-d');
  const all = [...BASE.map(i => ({...i, hi: false})), ...HIGHLIGHT.map(i => ({...i, hi: true}))];
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:0;max-width:520px">
    <div style="padding:12px 18px;border-radius:10px;background:#1e2328;border:1px solid #2a3040;font-size:13px;font-weight:700;color:#e8e2d9;display:inline-block;align-self:flex-start;margin-bottom:0">
      Deskhand
    </div>
    <div style="margin-left:16px;border-left:1px solid #2a3040;padding-left:0;display:flex;flex-direction:column;gap:0">
      ${all.map((item, i) => `
        <div style="display:flex;align-items:flex-start;margin-top:0">
          <div style="width:20px;height:24px;border-bottom:1px solid #2a3040;margin-top:12px;flex-shrink:0"></div>
          <div style="margin-top:8px;padding:10px 16px;border-radius:8px;background:${item.hi ? '#1d675f1a' : '#171b20'};border:1px solid ${item.hi ? '#1d675f55' : '#22272f'};flex:1">
            <div style="font-size:12px;font-weight:600;color:${item.hi ? '#4db8ad' : '#9ca3af'}">${item.label}${item.hi ? ' <span style="font-size:10px;color:#1d675f;font-weight:700;margin-left:6px">★</span>' : ''}</div>
            <div style="font-size:11px;color:#4b5563;margin-top:3px">${item.sub}</div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ── tabs ──────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.diagram-wrap').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ── E: mind map (SVG horizontal) ─────────────────────────
function renderE() {
  const el = document.getElementById('grid-e');

  const branches = [
    { label: '对话', hi: false, children: ['多会话管理', '流式输出', '工具过程可视化'] },
    { label: '文件与项目', hi: false, children: ['工作目录', '文件附件', 'Artifact 面板'] },
    { label: '权限控制', hi: false, children: ['Ask 模式', 'Auto 模式'] },
    { label: '设置', hi: false, children: ['模型选择', 'API 配置'] },
    { label: 'Generative UI', hi: true, children: ['Playground', 'This or That', 'Guided Form'] },
    { label: 'Skill 系统', hi: true, children: ['内置 Skills', 'Skill Insight', '自动推荐安装'] },
    { label: '剪贴板感知', hi: true, children: ['历史监控', 'AI 可调用', '内容注入'] },
  ];

  const W = 680, rootX = 80, rootY = 320;
  const branchX = 240;
  const leafX = 460;
  const totalH = branches.length * 72;
  const startY = rootY - (totalH / 2) + 36;

  let svgLines = '';
  let svgNodes = '';

  branches.forEach((branch, bi) => {
    const by = startY + bi * 72;
    const hi = branch.hi;
    const branchColor = hi ? '#4db8ad' : '#6b7280';
    const branchBg = hi ? '#1d675f22' : '#1e2328';
    const branchBorder = hi ? '#1d675f66' : '#2a3040';

    // root → branch line
    svgLines += `<path d="M${rootX + 60},${rootY} C${(rootX+60+branchX)/2},${rootY} ${(rootX+60+branchX)/2},${by} ${branchX},${by}" fill="none" stroke="${hi ? '#1d675f' : '#2a3040'}" stroke-width="${hi ? 2 : 1}"/>`;

    // branch node
    svgNodes += `<rect x="${branchX}" y="${by - 16}" width="130" height="32" rx="8" fill="${branchBg}" stroke="${branchBorder}" stroke-width="1.2"/>
    <text x="${branchX + 65}" y="${by + 5}" text-anchor="middle" font-size="12" font-weight="600" fill="${branchColor}" font-family="-apple-system,sans-serif">${branch.label}</text>`;

    if (hi) {
      svgNodes += `<text x="${branchX + 65}" y="${by - 22}" text-anchor="middle" font-size="9" fill="#1d675f" font-family="-apple-system,sans-serif" letter-spacing="0.08em">★ 本次重点</text>`;
    }

    // children
    const childCount = branch.children.length;
    const childSpread = (childCount - 1) * 28;
    branch.children.forEach((child, ci) => {
      const cy = by - childSpread / 2 + ci * 28;
      svgLines += `<line x1="${branchX + 130}" y1="${by}" x2="${leafX}" y2="${cy}" stroke="${hi ? '#1d675f44' : '#22272f'}" stroke-width="1"/>`;
      svgNodes += `<text x="${leafX + 6}" y="${cy + 4}" font-size="10.5" fill="${hi ? '#6ecfc8' : '#4b5563'}" font-family="-apple-system,sans-serif">${child}</text>`;
    });
  });

  // root node
  svgNodes += `<rect x="${rootX}" y="${rootY - 26}" width="118" height="52" rx="12" fill="#1e2328" stroke="#3a4050" stroke-width="1.5"/>
  <text x="${rootX + 59}" y="${rootY - 4}" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e2d9" font-family="-apple-system,sans-serif">Deskhand</text>
  <text x="${rootX + 59}" y="${rootY + 14}" text-anchor="middle" font-size="10" fill="#6b7280" font-family="-apple-system,sans-serif">桌面智能体</text>`;

  el.innerHTML = `<svg width="${W}" height="${totalH + 80}" viewBox="0 -40 ${W} ${totalH + 80}">
    ${svgLines}
    ${svgNodes}
  </svg>`;
}

renderA(); renderB(); renderC(); renderD(); renderE();
</script>
